<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Skribe">
  <!-- Rounded badge so the icon reads on both light and dark backgrounds. -->
  <rect x="2" y="2" width="60" height="60" rx="11" ry="11" fill="#1F3A5F"/>

  <!-- Quill plume: a leaf-shaped silhouette running diagonally from the
       upper-right down to the nib at lower-left. -->
  <path d="M 52 10
           C 32 18, 20 32, 14 50
           L 18 54
           C 36 46, 46 34, 54 16
           Z"
        fill="#F0DEB5"/>

  <!-- Center vein down the feather. -->
  <path d="M 52 10 C 40 20, 28 34, 16 52"
        stroke="#A88E5C" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- A few barb hatch marks so it reads as feather, not a leaf. -->
  <g stroke="#A88E5C" stroke-width="0.8" stroke-linecap="round" fill="none">
    <path d="M 44 15 L 49 18"/>
    <path d="M 38 21 L 44 24"/>
    <path d="M 32 28 L 38 31"/>
    <path d="M 26 36 L 33 39"/>
    <path d="M 21 44 L 28 47"/>
  </g>

  <!-- Nib pointing down-left, ending in an ink-dipped tip. -->
  <path d="M 14 50 L 8 58 L 20 54 Z" fill="#F0DEB5"/>
  <path d="M 9 57 L 11 59 L 13 57 L 11 55 Z" fill="#0E2235"/>

  <!-- A small ink drop already fallen below, for character. -->
  <circle cx="6" cy="60" r="1.6" fill="#0E2235"/>
</svg>
